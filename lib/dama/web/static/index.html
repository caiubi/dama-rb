<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>dama-rb: Web Demo (WebGPU)</title>
  <style>
    body { margin: 0; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
    canvas { border: 1px solid #333; touch-action: none; }
    #loading { color: #fff; font-family: sans-serif; font-size: 24px; position: absolute; }
    #repo-link { color: #666; font-family: sans-serif; font-size: 13px; margin-top: 10px; text-decoration: none; }
    #repo-link:hover { color: #6af; }
    #dama-error {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.92); z-index: 1000;
      font-family: sans-serif; color: #fff;
      padding: 32px; box-sizing: border-box;
      overflow-y: auto;
    }
    #dama-error h2 { color: #f44; margin: 0 0 12px; font-size: 20px; }
    #dama-error pre {
      background: #1a1a1a; color: #faa; padding: 16px; border-radius: 6px;
      font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
      max-height: 50vh; overflow-y: auto; margin: 0 0 16px;
    }
    #dama-error .context { color: #888; font-size: 12px; margin-bottom: 16px; }
    #dama-error button {
      background: #333; color: #fff; border: 1px solid #555; border-radius: 4px;
      padding: 8px 20px; font-size: 14px; cursor: pointer;
    }
    #dama-error button:hover { background: #444; }
  </style>
</head>
<body>
  <div id="loading">Loading...</div>
  <canvas id="game"></canvas>
  <a id="repo-link" href="https://github.com/caiubi/dama-rb">github.com/caiubi/dama-rb</a>
  <div id="dama-error">
    <h2 id="dama-error-title"></h2>
    <pre id="dama-error-detail"></pre>
    <div id="dama-error-context" class="context"></div>
    <button onclick="location.reload()">Reload</button>
  </div>

  <script type="module">
    // --- Error reporting ---
    // Captures errors from all layers (JS, Ruby/wasm, Rust/wgpu) and displays
    // them in a styled overlay with context for debugging.
    window.__damaErrors = [];
    let gameStopped = false;

    function showError(title, detail, extra) {
      gameStopped = true;
      const ctx = {
        frame: window.__damaState?.frameCount ?? "?",
        scene: window.__damaState?.sceneName ?? "?",
        time: new Date().toISOString(),
        ...(extra || {}),
      };
      console.error("[dama] " + title, detail, ctx);
      window.__damaErrors.push(title + ": " + detail);

      const overlay = document.getElementById("dama-error");
      document.getElementById("dama-error-title").textContent = title;
      document.getElementById("dama-error-detail").textContent = detail;
      document.getElementById("dama-error-context").textContent =
        "Frame: " + ctx.frame + " | Scene: " + ctx.scene +
        " | Source: " + (ctx.source || "unknown") + " | " + ctx.time;
      overlay.style.display = "block";
      document.getElementById("loading").style.display = "none";
    }

    window.addEventListener("error", e => {
      window.__damaErrors.push(e.message);
      if (!gameStopped) showError("Uncaught Error", e.message + "\n" + (e.filename || "") + ":" + (e.lineno || ""), { source: "window.onerror" });
    });

    window.addEventListener("unhandledrejection", e => {
      const msg = e.reason?.message || String(e.reason);
      const stack = e.reason?.stack || "";
      window.__damaErrors.push(msg);
      if (!gameStopped) showError("Unhandled Promise Rejection", stack || msg, { source: "unhandledrejection" });
      e.preventDefault();
    });

    // 1. Load the Rust wgpu renderer (compiled to wasm).
    const loading = document.getElementById("loading");

    // WebGPU is required by the Rust/wgpu renderer. Show a clear
    // message instead of a cryptic wasm error on unsupported browsers.
    if (!navigator.gpu) {
      loading.innerHTML = [
        "<strong>WebGPU is not supported in this browser.</strong>",
        "<br><br>",
        "dama-rb requires WebGPU to render. Please use one of these browsers:",
        "<br>",
        "\u2022 Chrome 113+ or Edge 113+",
        "<br>",
        "\u2022 Firefox Nightly (with dom.webgpu.enabled)",
        "<br><br>",
        '<a href="https://github.com/caiubi/dama-rb" style="color:#6af">Back to GitHub</a>',
      ].join("");
      loading.style.maxWidth = "400px";
      loading.style.textAlign = "center";
      loading.style.lineHeight = "1.6";
      throw new Error("WebGPU not supported");
    }

    loading.textContent = "Loading renderer...";

    // Set canvas to physical pixel resolution for Retina sharpness.
    const canvas = document.getElementById("game");
    const dpr = window.devicePixelRatio || 1;
    const logicalWidth = 800;
    const logicalHeight = 600;
    canvas.width = logicalWidth * dpr;
    canvas.height = logicalHeight * dpr;
    canvas.style.width = logicalWidth + "px";
    canvas.style.height = logicalHeight + "px";

    let renderer;
    try {
      const mod = await import("./pkg/dama_native.js");
      await mod.default();
      renderer = mod;
    } catch (e) {
      showError("Failed to load renderer", e.stack || e.message, { source: "renderer_init" });
      throw e;
    }

    // Expose renderer exports globally (for ruby.wasm to call via JS.global).
    window.damaWgpu = renderer;

    // Initialize the Rust renderer with logical dimensions.
    // The canvas backing buffer is already set to physical (dpr × logical).
    renderer.dama_init("game", logicalWidth, logicalHeight);

    // Wait for async GPU init to complete.
    // Rust's spawn_local sets window.__damaReady when the engine is fully initialized.
    await new Promise(resolve => {
      const check = setInterval(() => {
        if (window.__damaReady) { clearInterval(check); resolve(); }
      }, 10);
      setTimeout(() => { clearInterval(check); resolve(); }, 10000);
    });

    // Input: forward browser events to Rust wasm.
    const KEY_MAP = {
      ArrowLeft: 80, ArrowRight: 81, ArrowUp: 82, ArrowDown: 79,
      Space: 62, Enter: 57, Escape: 114, Backspace: 52, Tab: 63,
      ShiftLeft: 60, ShiftRight: 61, ControlLeft: 55, ControlRight: 56,
      AltLeft: 50, AltRight: 51,
      KeyA: 19, KeyB: 20, KeyC: 21, KeyD: 22, KeyE: 23, KeyF: 24,
      KeyG: 25, KeyH: 26, KeyI: 27, KeyJ: 28, KeyK: 29, KeyL: 30,
      KeyM: 31, KeyN: 32, KeyO: 33, KeyP: 34, KeyQ: 35, KeyR: 36,
      KeyS: 37, KeyT: 38, KeyU: 39, KeyV: 40, KeyW: 41, KeyX: 42,
      KeyY: 43, KeyZ: 44,
      Digit0: 5, Digit1: 6, Digit2: 7, Digit3: 8, Digit4: 9,
      Digit5: 10, Digit6: 11, Digit7: 12, Digit8: 13, Digit9: 14,
      Equal: 15, Minus: 45,
    };

    document.addEventListener("keydown", e => {
      const c = KEY_MAP[e.code]; if (c !== undefined) { e.preventDefault(); renderer.dama_input_set_key(c, true); }
    });
    document.addEventListener("keyup", e => {
      const c = KEY_MAP[e.code]; if (c !== undefined) renderer.dama_input_set_key(c, false);
    });
    // Pointer events unify mouse, touch, and pen input into a single API,
    // enabling both desktop and mobile interaction without separate handlers.
    function updatePointerPosition(e) {
      const r = canvas.getBoundingClientRect();
      renderer.dama_input_set_mouse(e.clientX - r.left, e.clientY - r.top);
    }
    canvas.addEventListener("pointermove", updatePointerPosition);
    // Track mouse button state in JS for Ruby to read without re-entering Rust wasm.
    // On touch devices a fast tap can fire pointerdown+pointerup between frames,
    // so we defer the release until the next dama_input_begin_frame has consumed it.
    window.damaMouseButtons = {};
    window.damaMousePendingUp = {};
    canvas.addEventListener("pointerdown", e => {
      updatePointerPosition(e);
      renderer.dama_input_set_mouse_button(e.button, true);
      window.damaMouseButtons[e.button] = true;
      window.damaMousePendingUp[e.button] = false;
    });
    canvas.addEventListener("pointerup", e => {
      window.damaMousePendingUp[e.button] = true;
    });

    // Timing state for Ruby to read.
    window.damaTime = { delta: 0.016 };

    // 2. Load ruby.wasm + game code.
    loading.textContent = "Loading ruby.wasm...";

    let vm;
    try {
      const { DefaultRubyVM } = await import("./ruby_wasm.js");
      const response = await fetch("game.wasm");
      const module = await WebAssembly.compile(await response.arrayBuffer());
      const result = await DefaultRubyVM(module);
      vm = result.vm;
    } catch (e) {
      showError("Failed to load ruby.wasm", e.stack || e.message, { source: "ruby_wasm_init" });
      throw e;
    }

    loading.textContent = "Starting game...";
    
    vm.eval('require "/src/app"');
    loading.style.display = "none";

    // 3. JS-driven frame loop.
    let lastTime = performance.now();
    function gameLoop(timestamp) {
      if (gameStopped) return;

      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;
      window.damaTime.delta = dt;

      renderer.dama_input_begin_frame();

      try {
        vm.eval("$dama_tick.call");
      } catch (e) {
        showError("Game Error", e.stack || e.message, { source: "ruby_tick" });
        return;
      }

      // Flush deferred pointer releases after the frame consumed the pressed state.
      // This ensures a fast tap (pointerdown+pointerup between frames) is visible
      // to the Ruby tick for at least one frame before being cleared.
      for (const btn in window.damaMousePendingUp) {
        if (window.damaMousePendingUp[btn]) {
          renderer.dama_input_set_mouse_button(Number(btn), false);
          window.damaMouseButtons[btn] = false;
          window.damaMousePendingUp[btn] = false;
        }
      }

      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
